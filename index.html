<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大樓包裹管理系統</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 16px;
  }
  .header { text-align: center; padding: 20px 0 10px; }
  .header h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 4px; }
  .header .date { font-size: 1rem; color: #666; }
  .stats-bar { display: flex; justify-content: center; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
  .stat-item { background: #fff; border-radius: 12px; padding: 12px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
  .stat-item .num { font-size: 1.8rem; font-weight: 700; color: #4361ee; }
  .stat-item .label { font-size: 0.85rem; color: #888; }
  .grid-container { max-width: 1100px; margin: 0 auto; overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  thead th { background: #4361ee; color: #fff; padding: 12px 6px; font-size: 0.95rem; font-weight: 600; position: sticky; top: 0; z-index: 2; }
  thead th:first-child { background: #3a56d4; text-align: center; width: 60px; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: #f8f9ff; }
  tbody tr:nth-child(even) { background: #fafbff; }
  tbody tr:nth-child(even):hover { background: #f0f2ff; }
  tbody td { text-align: center; padding: 8px 4px; border-bottom: 1px solid #eee; }
  tbody td:first-child { font-weight: 700; color: #4361ee; font-size: 0.95rem; background: #f4f6ff; }
  .cb-wrap { display: inline-flex; align-items: center; justify-content: center; }
  .cb-wrap input[type="checkbox"] { display: none; }
  .cb-wrap .cb-visual { width: 36px; height: 36px; border-radius: 10px; border: 2px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1.2rem; user-select: none; }
  .cb-wrap .cb-visual:hover { border-color: #4361ee; background: #f0f3ff; }
  .cb-wrap input:checked + .cb-visual { background: #4361ee; border-color: #4361ee; color: #fff; box-shadow: 0 2px 8px rgba(67, 97, 238, 0.35); }
  .cb-wrap input:checked + .cb-visual::after { content: '📦'; font-size: 1.1rem; }
  .row-toggle { display: inline-block; padding: 4px 10px; border-radius: 8px; background: #e8ecff; color: #4361ee; font-size: 0.75rem; cursor: pointer; margin-top: 2px; user-select: none; transition: background 0.15s; }
  .row-toggle:hover { background: #4361ee; color: #fff; }
  .actions { text-align: center; margin: 24px 0; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .btn { padding: 14px 40px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-send { background: #06d6a0; color: #fff; }
  .btn-send:hover { background: #05c090; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(6,214,160,0.4); }
  .btn-clear { background: #e9ecef; color: #555; }
  .btn-clear:hover { background: #dee2e6; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 28px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { margin-bottom: 16px; color: #1a1a2e; font-size: 1.3rem; }
  .modal pre { background: #f4f6ff; padding: 16px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; font-size: 0.9rem; line-height: 1.6; color: #333; max-height: 50vh; overflow-y: auto; }
  .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
  .modal .btn-confirm { background: #06d6a0; color: #fff; padding: 10px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .modal .btn-cancel { background: #e9ecef; color: #555; padding: 10px 28px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 1rem; opacity: 0; transition: all 0.4s; z-index: 200; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { background: #06d6a0; }
  .toast.error { background: #ef476f; }
  .btn-line { background: #06C755; color: #fff; }
  .btn-line:hover { background: #05b34d; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(6,199,85,0.4); }
  .btn-copy { background: #4361ee; color: #fff; }
  .btn-copy:hover { background: #3a56d4; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(67,97,238,0.4); }
  @media (max-width: 768px) {
    thead th, tbody td { padding: 6px 2px; font-size: 0.8rem; }
    .cb-wrap .cb-visual { width: 30px; height: 30px; border-radius: 8px; }
    .cb-wrap input:checked + .cb-visual::after { font-size: 0.9rem; }
    .header h1 { font-size: 1.3rem; }
    .btn { padding: 12px 24px; font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📦 大樓包裹通知系統</h1>
  <div class="date" id="todayDate"></div>
</div>
<div class="stats-bar">
  <div class="stat-item">
    <div class="num" id="totalCount">0</div>
    <div class="label">有包裹戶數</div>
  </div>
  <div class="stat-item">
    <div class="num" id="buildingCount">0</div>
    <div class="label">涉及棟數</div>
  </div>
</div>
<div class="grid-container">
  <table id="mainTable">
    <thead><tr id="headerRow"></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div class="actions">
  <button class="btn btn-clear" onclick="clearAll()">🗑️ 清除全部</button>
  <button class="btn btn-send" onclick="previewSend()">📤 送出通知</button>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📋 確認通知內容</h2>
    <pre id="previewText"></pre>
    <div class="modal-actions" style="flex-wrap:wrap;gap:8px;">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" style="background:#4361ee;" onclick="copyMessage()">📋 複製訊息</button>
      <button class="btn-confirm" style="background:#06C755;" onclick="shareToLine()">💬 LINE 分享</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BUILDINGS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const FLOORS = [1,2,3,4,5,6,7];
const today = new Date();
document.getElementById('todayDate').textContent =
  `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')} (${['日','一','二','三','四','五','六'][today.getDay()]})`;
function buildTable() {
  const headerRow = document.getElementById('headerRow');
  const tbody = document.getElementById('tableBody');
  let hHtml = '<th>樓層</th>';
  BUILDINGS.forEach(b => { hHtml += `<th>${b}棟</th>`; });
  headerRow.innerHTML = hHtml;
  let bHtml = '';
  FLOORS.forEach(f => {
    bHtml += `<tr><td>${f}F</td>`;
    BUILDINGS.forEach(b => {
      const id = `${b}${f}`;
      bHtml += `<td><label class="cb-wrap"><input type="checkbox" id="cb_${id}" data-building="${b}" data-floor="${f}" onchange="updateStats()"><span class="cb-visual"></span></label></td>`;
    });
    bHtml += '</tr>';
  });
  bHtml += '<tr><td style="font-size:0.75rem;color:#888;">全選</td>';
  BUILDINGS.forEach(b => {
    bHtml += `<td><span class="row-toggle" onclick="toggleBuilding('${b}')">全棟</span></td>`;
  });
  bHtml += '</tr>';
  tbody.innerHTML = bHtml;
}
function toggleBuilding(building) {
  const cbs = document.querySelectorAll(`input[data-building="${building}"]`);
  const allChecked = Array.from(cbs).every(cb => cb.checked);
  cbs.forEach(cb => cb.checked = !allChecked);
  updateStats();
}
function updateStats() {
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');
  document.getElementById('totalCount').textContent = checked.length;
  const buildings = new Set();
  checked.forEach(cb => buildings.add(cb.dataset.building));
  document.getElementById('buildingCount').textContent = buildings.size;
}
function clearAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
  updateStats();
  showToast('已清除全部', 'success');
}
function getCheckedData() {
  const result = {};
  BUILDINGS.forEach(b => {
    const floors = [];
    FLOORS.forEach(f => {
      if (document.getElementById(`cb_${b}${f}`).checked) floors.push(f);
    });
    if (floors.length > 0) result[b] = floors;
  });
  return result;
}
function formatMessage(data) {
  const dateStr = document.getElementById('todayDate').textContent;
  let msg = `📦 大樓包裹通知\n📅 ${dateStr}\n${'─'.repeat(20)}\n`;
  if (Object.keys(data).length === 0) { msg += '\n✅ 今日無包裹'; return msg; }
  let total = 0;
  for (const [building, floors] of Object.entries(data)) {
    const units = floors.map(f => `${building}${f}`).join('、');
    msg += `\n🏢 ${building}棟：${units}`;
    total += floors.length;
  }
  msg += `\n\n${'─'.repeat(20)}`;
  msg += `\n📊 共 ${Object.keys(data).length} 棟、${total} 戶有包裹`;
  msg += '\n\n請住戶至管理室領取，謝謝！';
  return msg;
}
function previewSend() {
  const data = getCheckedData();
  const msg = formatMessage(data);
  document.getElementById('previewText').textContent = msg;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function copyMessage() {
  const data = getCheckedData();
  const msg = formatMessage(data);
  const ta = document.createElement('textarea');
  ta.value = msg;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let success = false;
  try { success = document.execCommand('copy'); } catch (e) { success = false; }
  document.body.removeChild(ta);
  if (success) { closeModal(); showToast('✅ 通知內容已複製！可直接貼到 LINE 群組', 'success'); }
  else {
    const pre = document.getElementById('previewText');
    const range = document.createRange();
    range.selectNodeContents(pre);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    showToast('已選取文字，請按 Ctrl+C 複製', 'error');
  }
}
function shareToLine() {
  const data = getCheckedData();
  const msg = formatMessage(data);
  const encoded = encodeURIComponent(msg);
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) { window.location.href = `line://msg/text/${encoded}`; }
  else { window.open(`https://social-plugins.line.me/lineit/share?url=&text=${encoded}`, '_blank', 'width=600,height=500'); }
  closeModal();
  showToast('✅ 已開啟 LINE 分享視窗', 'success');
}
function showToast(text, type) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}
buildTable();
</script>
</body>
</html>
